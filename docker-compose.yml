services:
  minio:
    image: minio/minio:latest
    ports:
      - "9002:9000"
      - "9003:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    volumes:
      - ./minio-init/init.sh:/init.sh:ro
    entrypoint: ["/bin/sh", "/init.sh"]

  backend:
    build:
      context: ./backend
    ports:
      - "3000:3000"
    environment:
      COLONY_HOST: ${COLONY_HOST}
      COLONY: ${COLONY}
      COLONY_PRIVATE_KEY: ${COLONY_PRIVATE_KEY}
      MINIO_PUBLIC_ENDPOINT: http://localhost:9002
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      RUST_LOG: info
    depends_on:
      minio-init:
        condition: service_completed_successfully

  worker:
    build:
      context: ./worker
    environment:
      COLONY_HOST: ${COLONY_HOST}
      COLONY: ${COLONY}
      COLONY_PRIVATE_KEY: ${COLONY_PRIVATE_KEY}
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      MINIO_INPUT_BUCKET: uploads
      MINIO_OUTPUT_BUCKET: outputs
      RUST_LOG: info
    depends_on:
      minio-init:
        condition: service_completed_successfully

  dashboard:
    build:
      context: ./dashboard
    ports:
      - "8080:80"
    depends_on:
      - backend

volumes:
  minio-data:
