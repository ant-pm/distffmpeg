kind: Stack
name: ffmpeg-stack
network: ffmpeg-net
volumes:
    - "ffmpeg-minio_data"
services:
    - name: "ffmpeg-minio"
      image: minio/minio:latest
      command:
          - server
          - /data
          - --console-address
          - ":9001"
      env:
          - MINIO_ROOT_USER={{ minio_access_key }}
          - MINIO_ROOT_PASSWORD={{ minio_secret_key }}
      mounts:
          - minio_data:/data

    - name: "ffmpeg-minio-init"
      image: alpine:latest
      command:
          - /bin/sh
          - -c
          - |
              apk add --no-cache curl
              until curl -sf http://ffmpeg-minio:9000/minio/health/live; do sleep 2; done
              curl -fsSL https://dl.min.io/client/mc/release/linux-amd64/mc -o /usr/local/bin/mc
              chmod +x /usr/local/bin/mc
              mc alias set local http://ffmpeg-minio:9000 {{ minio_access_key }} {{ minio_secret_key }}
              mc mb --ignore-existing local/uploads
              mc mb --ignore-existing local/outputs

    - name: "ffmpeg-backend"
      image: {{ backend_image }}
      env:
          - COLONY_HOST={{ colonies_server }}
          - COLONY={{ colony_name }}
          - COLONY_PRIVATE_KEY={{ colony_prvkey }}
          - MINIO_PUBLIC_ENDPOINT={{ minio_endpoint }}
          - MINIO_ENDPOINT=http://ffmpeg-minio:9000
          - MINIO_ACCESS_KEY={{ minio_access_key }}
          - MINIO_SECRET_KEY={{ minio_secret_key }}
          - RUST_LOG=info

    - name: "ffmpeg-dashboard"
      image: {{ dashboard_image }}
      env:
          - VITE_API_URL={{ backend_url }}

    - name: "ffmpeg-cloudflare-tunnel"
      image: cloudflare/cloudflared:latest
      command:
          - tunnel
          - run
      env:
          - TUNNEL_TOKEN={{ tunnel_token }}
